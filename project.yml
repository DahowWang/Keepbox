name: HTMLViewer
options:
  bundleIdPrefix: com.dahow
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "RMC25B858B"

targets:
  HTMLViewer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HTMLViewer
    resources:
      - path: HTMLViewer/Assets.xcassets
    info:
      path: HTMLViewer/Info.plist
      properties:
        CFBundleDisplayName: Keepbox
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "10"
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        LSSupportsOpeningDocumentsInPlace: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: HTML Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.html
    entitlements:
      path: HTMLViewer/HTMLViewer.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.dahow.keepbox
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.dahow.keepbox
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ShareExtension

  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ShareExtension
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: 存到 Keepbox
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "10"
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsWebPageWithMaxCount: 1
              NSExtensionActivationSupportsText: true
              NSExtensionActivationSupportsImageWithMaxCount: 1
              NSExtensionActivationSupportsFileWithMaxCount: 1
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionPointIdentifier: com.apple.share-services
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.dahow.keepbox
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.dahow.keepbox.ShareExtension
