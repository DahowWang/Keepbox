name: HTMLViewer
options:
  bundleIdPrefix: tw.mixxin
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    DEVELOPMENT_TEAM: "RMC25B858B"

targets:
  HTMLViewer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HTMLViewer
    resources:
      - path: HTMLViewer/Assets.xcassets
    info:
      path: HTMLViewer/Info.plist
      properties:
        CFBundleDisplayName: HTML Viewer
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchStoryboardName: ""
        LSSupportsOpeningDocumentsInPlace: true
        CFBundleDocumentTypes:
          - CFBundleTypeName: HTML Document
            CFBundleTypeRole: Viewer
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.html
    entitlements:
      path: HTMLViewer/HTMLViewer.entitlements
      properties:
        com.apple.security.application-groups:
          - group.tw.mixxin.htmlviewer
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: tw.mixxin.htmlviewer
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - target: ShareExtension

  ShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ShareExtension
    info:
      path: ShareExtension/Info.plist
      properties:
        CFBundleDisplayName: Save to HTML Viewer
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsFileWithMaxCount: 1
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionPointIdentifier: com.apple.share-services
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.tw.mixxin.htmlviewer
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: tw.mixxin.htmlviewer.ShareExtension
